aid: mandt-bank-corp
name: M&T Bank Corporation
description: >-
  M&T Bank Corporation (NYSE: MTB) is a regional financial services holding
  company headquartered in Buffalo, New York that provides commercial and retail
  banking services through its principal subsidiary M&T Bank to consumers and
  businesses across the eastern United States. The company offers checking,
  savings, lending, mortgage, wealth management, and treasury services.
